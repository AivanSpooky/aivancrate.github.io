{% extends 'mainh.html' %}

{% block title %}
AivanCrate - {{ t.pass_title }}
{% endblock %}

{% block body %}
<div class="container mt-5">
    <div class="card text-center">
        <img src="/static/images/sus.gif" class="card-img-top mx-auto" alt="Suspicious GIF" style="max-width: 350px; height: auto;">
        <div class="card-body">
            <h2 class="card-title">{{ t.pass_enter }}</h2>
            <div id="textt" class="text-danger mb-3"></div>
            <form method="post" action="{{ url_for('other.passw') }}" id="passForm">
                <div class="d-flex justify-content-center">
                    <input type="password" name="passwo" id="passwo" class="form-control w-50" placeholder="{{ t.pass_enter }}">
                    <button type="submit" class="btn btn-primary ms-2">{{ t.pass_submit }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
document.getElementById('passForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    fetch('{{ url_for("other.passw") }}', {
        method: 'POST',
        headers: {'X-Requested-With': 'XMLHttpRequest'},
        body: new URLSearchParams(formData)
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) window.location.href = data.redirect || '/ax';
        else document.getElementById('textt').textContent = '{{ t.pass_wrong }}';
    });
});
{% if notpas %}
document.getElementById('textt').textContent = '{{ t.pass_wrong }}';
{% endif %}
</script>
{% endblock %}

{% block center %}
{% endblock %}
