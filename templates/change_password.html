{% extends 'mainh.html' %}

{% block title %}
AivanCrate – {{ t.auth_change_password_title }}
{% endblock %}

{% block body %}
<div class="container mt-5 content-enter">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h1 class="text-center mb-4">{{ t.auth_change_password_title }}</h1>
            <form method="post" id="changePasswordForm" class="p-4 rounded" style="background: var(--panel-bg, #f8fafc);">
                <div id="clientError" class="alert alert-danger d-none" role="alert"></div>
                {% if error %}
                <div class="alert alert-danger">{{ t[error] }}</div>
                {% endif %}
                <div class="mb-3">
                    <label for="current_password" class="form-label">{{ t.auth_current_password }}</label>
                    <div class="input-group">
                        <input type="password" id="current_password" name="current_password" class="form-control" required>
                        <button type="button" class="btn btn-outline-secondary toggle-password" data-target="current_password" title="{{ t.auth_show_password }}" aria-label="{{ t.auth_show_password }}">👁</button>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="new_password" class="form-label">{{ t.auth_new_password }}</label>
                    <div class="input-group">
                        <input type="password" id="new_password" name="new_password" class="form-control" required minlength="6">
                        <button type="button" class="btn btn-outline-secondary toggle-password" data-target="new_password" title="{{ t.auth_show_password }}" aria-label="{{ t.auth_show_password }}">👁</button>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="new_password2" class="form-label">{{ t.auth_new_password2 }}</label>
                    <div class="input-group">
                        <input type="password" id="new_password2" name="new_password2" class="form-control" required minlength="6">
                        <button type="button" class="btn btn-outline-secondary toggle-password" data-target="new_password2" title="{{ t.auth_show_password }}" aria-label="{{ t.auth_show_password }}">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">{{ t.auth_save_password }}</button>
            </form>
            <script>
            (function() {
                var form = document.getElementById('changePasswordForm');
                var clientError = document.getElementById('clientError');
                var mismatchMsg = '{{ t.auth_password_mismatch }}';
                form.addEventListener('submit', function(e) {
                    var new1 = document.getElementById('new_password').value;
                    var new2 = document.getElementById('new_password2').value;
                    if (new1 !== new2) {
                        e.preventDefault();
                        clientError.textContent = mismatchMsg;
                        clientError.classList.remove('d-none');
                        return false;
                    }
                    clientError.classList.add('d-none');
                });
                document.querySelectorAll('.toggle-password').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var id = this.getAttribute('data-target');
                        var input = document.getElementById(id);
                        if (!input) return;
                        if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
                        else { input.type = 'password'; btn.textContent = '👁'; }
                    });
                });
            })();
            </script>
            <p class="text-center mt-3">
                <a href="{{ url_for('applications.list_applications') }}" class="btn btn-secondary">{{ t.ext_back }}</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
